<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theraseek Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F8E9E4;
      --card: #FFFDFC;
      --plum: #2A1820;
      --plum-mid: #6E2C3E;
      --mauve: #C9A0A8;
      --accent: #E07A5F;
      --muted: #5C4751;
    }
    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      color: var(--plum);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 2rem;
    }
    .admin-container {
      background: var(--card);
      width: 100%;
      max-width: 800px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(61, 31, 61, 0.08);
      padding: 2.5rem 3rem;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      color: var(--plum-mid);
      margin-top: 0;
      border-bottom: 2px solid rgba(201, 168, 196, 0.3);
      padding-bottom: 1rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 2rem;
    }
    th, td {
      text-align: left;
      padding: 1rem;
      border-bottom: 1px solid rgba(201, 168, 196, 0.3);
    }
    th {
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.05em;
    }
    td {
      font-weight: 400;
    }
    .status-waitlist {
      background: rgba(224, 122, 95, 0.1);
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      display: inline-block;
    }
    .status-account {
      background: rgba(110, 44, 62, 0.1);
      color: var(--plum-mid);
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      display: inline-block;
    }
    .error-msg {
      color: var(--accent);
      margin-top: 1rem;
    }
  </style>
</head>
<body>

  <div class="admin-container">
    <h1>Theraseek Users</h1>
    
    <table id="users-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Email</th>
          <th>Status</th>
          <th>Signed Up At</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="users-body">
        <tr><td colspan="5">Loading users...</td></tr>
      </tbody>
    </table>
    
    <div id="error-container" class="error-msg"></div>

    <h1 style="margin-top: 4rem;">User Feedback</h1>
    <table id="fb-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Email</th>
          <th>Message</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="fb-body">
        <tr><td colspan="4">Loading feedback...</td></tr>
      </tbody>
    </table>
    <div id="fb-error" class="error-msg"></div>
  </div>

  <script>
    const pass = prompt("Enter Admin Password:");
    if (pass !== "seekinghope") {
      document.body.innerHTML = "<h1 style='text-align:center;margin-top:20%;font-family:Playfair Display,serif;color:var(--plum-mid);'>Access Denied</h1>";
      throw new Error("Invalid password");
    }

    const API_BASE = 'https://theraseek-api.rajarshisaha123-4.workers.dev';

    async function loadUsers() {
      const tbody = document.getElementById('users-body');
      const errBox = document.getElementById('error-container');
      
      try {
        const res = await fetch(`${API_BASE}/api/admin/users`);
        const data = await res.json();
        
        if (!data.ok) throw new Error(data.error || "Failed to fetch users");
        
        if (data.users.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5">No users found in database.</td></tr>';
          return;
        }

        tbody.innerHTML = '';
        data.users.forEach(user => {
          const tr = document.createElement('tr');
          const date = new Date(user.created_at).toLocaleString();
          const statusClass = user.status === 'waitlist' ? 'status-waitlist' : 'status-account';
          
          tr.innerHTML = `
            <td>${user.id}</td>
            <td><strong>${user.email}</strong></td>
            <td><span class="${statusClass}">${user.status}</span></td>
            <td>${date}</td>
            <td><button onclick="deleteUser(${user.id})" style="background:#e07a5f; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">Delete</button></td>
          `;
          tbody.appendChild(tr);
        });
      } catch (err) {
        tbody.innerHTML = '<tr><td colspan="5">Failed to load. Is the backend running?</td></tr>';
        errBox.textContent = "Error: " + err.message;
      }
    }

    async function deleteUser(id) {
      if (!confirm("Are you sure you want to delete this user?")) return;
      try {
        const res = await fetch(`${API_BASE}/api/admin/users/${id}`, { method: 'DELETE' });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || "Failed to delete user");
        loadUsers(); // Refresh the list
      } catch (err) {
        alert("Error deleting user: " + err.message);
      }
    }

    async function loadFeedback() {
      const tbody = document.getElementById('fb-body');
      const errBox = document.getElementById('fb-error');
      
      try {
        const res = await fetch(`${API_BASE}/api/admin/feedback`);
        const data = await res.json();
        
        if (!data.ok) throw new Error(data.error || "Failed to fetch feedback");
        
        if (data.feedback.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4">No feedback found.</td></tr>';
          return;
        }

        tbody.innerHTML = '';
        data.feedback.forEach(fb => {
          const tr = document.createElement('tr');
          const date = new Date(fb.created_at).toLocaleString();
          
          tr.innerHTML = `
            <td>${fb.id}</td>
            <td><strong>${fb.email}</strong></td>
            <td style="max-width:300px; white-space:pre-wrap;">${fb.message}</td>
            <td>${date}</td>
          `;
          tbody.appendChild(tr);
        });
      } catch (err) {
        tbody.innerHTML = '<tr><td colspan="4">Failed to load feedback.</td></tr>';
        errBox.textContent = "Error: " + err.message;
      }
    }
    
    loadUsers();
    loadFeedback();
  </script>
</body>
</html>
