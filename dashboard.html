<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Theraseek</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="index.css">
<style>
  body { background: var(--bg); display: flex; flex-direction: column; min-height: 100vh; }
  .dashboard-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 6rem 2rem;
  }
  .dashboard-card {
    background: var(--card);
    border-radius: 24px;
    padding: 3rem;
    box-shadow: 0 10px 40px rgba(61, 31, 61, 0.08);
    max-width: 500px;
    width: 100%;
    text-align: center;
  }
  .dashboard-card h1 {
    font-family: 'Playfair Display', serif;
    color: var(--plum-mid);
    font-size: 2rem;
    margin-bottom: 1rem;
  }
  .dashboard-card p {
    color: var(--muted);
    font-size: 1.1rem;
    line-height: 1.6;
    margin-bottom: 2rem;
  }
  .status-badge {
    display: inline-block;
    padding: 0.5rem 1.5rem;
    border-radius: 100px;
    font-weight: 600;
    font-size: 1rem;
    margin-bottom: 2rem;
  }
  .status-account {
    background: rgba(110, 44, 62, 0.1);
    color: var(--plum-mid);
  }
  .status-waitlist {
    background: rgba(224, 122, 95, 0.1);
    color: var(--accent);
  }
  .btn-dashboard {
    display: block;
    width: 100%;
    padding: 1rem;
    border-radius: 100px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 1rem;
    transition: all 0.3s ease;
  }
  .btn-account {
    background: var(--plum-mid);
    color: var(--white);
  }
  .btn-account:hover {
    background: var(--plum);
  }
  .btn-logout {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  .btn-logout:hover {
    background: rgba(224, 122, 95, 0.1);
  }
</style>
</head>
<body>

<nav>
  <a class="logo-text" href="index.html"><span class="thera">Thera</span><span class="seek">seek</span></a>
</nav>

<div class="dashboard-container">
  <div class="dashboard-card">
    <h1 id="welcome-msg">Welcome Back</h1>
    <p>We are currently setting things up for you.</p>
    
    <div id="status-display" class="status-badge">Loading...</div>
    
    <button class="btn-dashboard btn-account" onclick="alert('Account Details coming soon!')">Account Details</button>
    <button class="btn-dashboard btn-logout" onclick="logout()">Log Out</button>
  </div>
</div>

<script>
  function checkAuth() {
    const email = localStorage.getItem('theraseek_email');
    const status = localStorage.getItem('theraseek_status') || 'waitlist';
    
    if (!email) {
      window.location.href = 'index.html';
      return;
    }
    
    document.getElementById('welcome-msg').textContent = `Welcome, ${email.split('@')[0]}`;
    
    const statusBadge = document.getElementById('status-display');
    if (status === 'account') {
      statusBadge.textContent = 'Waitlist Status: Approved (Account Active)';
      statusBadge.className = 'status-badge status-account';
    } else {
      statusBadge.textContent = 'Waitlist Status: Pending';
      statusBadge.className = 'status-badge status-waitlist';
    }
  }

  function logout() {
    localStorage.removeItem('theraseek_email');
    localStorage.removeItem('theraseek_status');
    window.location.href = 'index.html';
  }

  document.addEventListener('DOMContentLoaded', checkAuth);
</script>
</body>
</html>
